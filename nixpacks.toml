# Nixpacks build config for Coolify / Railway.
# Preferimos Dockerfile, mas se o Build Pack estiver como "Nixpacks"
# este arquivo garante que o app buile e suba corretamente.

[phases.setup]
nixPkgs = ["nodejs_22", "bun"]

[phases.install]
cmds = ["bun install --frozen-lockfile || bun install"]

[phases.build]
cmds = ["bun run build"]

[start]
cmd = "node .output/server/index.mjs"

[variables]
NODE_ENV = "production"
HOST = "0.0.0.0"
PORT = "3000"
